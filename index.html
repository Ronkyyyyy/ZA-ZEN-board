<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZA-ZEN 補助アプリ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           ▼▼▼ 素材差し替えエリア（画像・フォント） ▼▼▼
        ========================================= */
        :root {
            /* 1. 大きく表示する演出用のフォント（筆文字風） */
            --font-display: 'Yuji Syuku', serif;
            
            /* 2. プレーンテキスト用のフォント（UI・作法用ゴシック体） */
            --font-plain: 'Noto Sans JP', sans-serif;
            
            /* --- 色の定義 --- */
            --bg-base: #f4f1ea; --bg-panel: rgba(255, 255, 255, 0.7); 
            --text-main: #333333; --text-sub: #666666; 
            --accent-color: #c94f4f; --border-color: #d1cae1; 
        }

        /* 3. 背景画像 */
        /* アプリ全体のベース（タイトル画面などはここ） */
        #app-container {
            background-image: url('img/bg_temple.png');
            background-color: var(--bg-base); /* 画像がない時の予備色 */
            background-size: cover; 
            background-position: center;
        }

        /* 修行画面（入山後）専用の背景：山寺の床 */
        #screen-shugyo {
            background-image: url('img/bg_floor.png'); /* ←ここに床の画像を指定 */
            background-size: cover;
            background-position: center;
            /* 画面遷移のアニメーション用（既存の設定） */
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* 審査画面（住職の前）専用の背景 */
        #screen-judge {
            background-image: url('img/bg_judge_wall.png'); */
            background-color: #6d6358;
            background-size: cover;
            background-position: center;
            /* 画面遷移のアニメーション用（既存の設定） */
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* 4. 瞑想箱 */
        #box-lid {
            /* background-image: url('img/box_lid.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        #box-inside {
            /* background-image: url('img/box_inside.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* 5. 煩悩チップ */
        .chip { background-size: contain; background-repeat: no-repeat; background-position: center; }
        .chip.face-hidden {
            /* background-image: url('img/chip_hidden.png'); */
            /* color: transparent; */ 
            background-color: rgba(255,255,255,0.9); /* 仮背景 */
        }
        .chip.face-body {
            /* background-image: url('img/chip_shin.png'); */
            /* color: transparent; */
            background-color: #fce4e4; /* 仮背景 */
        }
        .chip.face-breath {
            /* background-image: url('img/chip_soku.png'); */
            /* color: transparent; */
            background-color: #e4fce4; /* 仮背景 */
        }
        .chip.face-mind {
            /* background-image: url('img/chip_kokoro.png'); */
            /* color: transparent; */
            background-color: #e4e4fc; /* 仮背景 */
        }

	/* 6. タイトルロゴ（画像を設定したら、h1 の color: transparent; を有効にしてください） */
        #sanmon-title-area {
            background-image: url('img/title_logo.png');
            background-size: contain; /* 画像を枠内に収める */
            background-repeat: no-repeat;
            background-position: center;
            
            /* ▼ ロゴの表示サイズに合わせて調整してください ▼ */
            width: 80%;         /* 画面幅の80% */
            max-width: 600px;   /* 最大でも600pxまで */
            height: 150px;      /* ロゴの高さ（適宜調整） */
            margin-bottom: 20px; /* ダイヤルとの間隔 */
        }
        
        #sanmon-title-area h1 {
            /* 画像を表示する場合、仮のテキストを透明にして消す */
            color: transparent;
            
            /* 演出用フォントの設定（画像が無い場合の予備として残す） */
            font-family: var(--font-display); font-size: 3rem; font-weight: normal; letter-spacing: 0.3em;
        }
        /* =========================================
           ▲▲▲ 素材差し替えエリアここまで ▲▲▲
        ========================================= */

        /* --- Base Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }
        
        body {
    	font-family: var(--font-plain); 
    	background-color: #e0ddd5; 
    	color: var(--text-main); 
    	width: 100vw; 
    
    	/* ▼ ここを修正 ▼ */
    	height: 100vh;  /* 古いブラウザ用の予備 */
    	height: 100dvh; /* ★ 実際の表示領域にピタッと合わせる魔法の単位 */
    	/* ▲ ここまで ▲ */
    
    	overflow: hidden; 
    	display: flex; justify-content: center; align-items: center; 
	}
        
        #app-container { position: relative; width: 100%; height: 100%; max-width: 960px; background-color: var(--bg-base); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        /* --- Animations --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .shake-active { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* --- Screens --- */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.6s ease-out; z-index: 10; }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 20; }
        .btn { font-family: var(--font-plain); background-color: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color); padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; }
        .btn:active { background-color: #fff; border-color: var(--accent-color); color: var(--accent-color); transform: translateY(1px); }

        /* --- Sanmon (Title) --- */
        #screen-sanmon { justify-content: center; align-items: center; gap: 40px; padding: 20px; }
        #sanmon-title-area { text-align: center; padding: 20px; }
        #sanmon-title-area h1 { font-family: var(--font-display); font-size: 3rem; font-weight: normal; letter-spacing: 0.3em; }
        .settings-group { display: flex; align-items: center; gap: 15px; background: var(--bg-panel); padding: 15px 25px; border-radius: 4px; border: 1px solid var(--border-color); }
        #gaze-time-select { font-family: var(--font-plain); font-size: 1.1rem; padding: 8px 15px; border-radius: 4px; background: #fff; color: var(--text-main); border: 1px solid var(--border-color); cursor: pointer; }
        .action-buttons { display: flex; gap: 25px; }

        /* --- Shugyo (Play) --- */
        #screen-shugyo { transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        #system-message { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 1.1rem; z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #system-message.show { opacity: 1; }
        #shugyo-header { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 50; transition: opacity 0.3s; }
        #btn-judge { border-color: var(--accent-color); color: var(--accent-color); font-size: 1.1rem; padding: 10px 40px; }
        #shugyo-bottom-ui { position: absolute; bottom: 20px; left: 0; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 50; transition: opacity 0.3s; pointer-events: none; }
        #shugyo-bottom-ui * { pointer-events: auto; }
        #dial-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #dial-label { font-size: 0.8rem; color: var(--text-sub); background: rgba(255,255,255,0.7); padding: 2px 8px; border-radius: 10px; }
        #dial-control { display: flex; align-items: center; gap: 10px; background-color: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .dial-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background-color: #fff; color: var(--text-main); font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .dial-btn:active { background-color: var(--border-color); }
        #flip-count-display { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); width: 30px; text-align: center; }

        /* --- Meditation Box --- */
        #meditation-box-container { 
    		position: absolute; 
    		top: 50%; left: 50%; 
    
    		/* ▼ ここを修正（4:3の比率で、画面の高さの50%を基準にする例） ▼ */
    		width: 60vh; 
    		height: 45vh; 
    		/* ▲ ここまで ▲ */
    
    		transform: translate(-50%, -50%); 
    		transition: transform 0.8s ease-in-out; 
    		z-index: 30; 
	}
        #box-inside { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #e0ddd5; border: 2px solid #bda; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 30px; gap: 15px; }
        .chip { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: var(--text-main); border: 2px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s ease, box-shadow 0.2s; transform-style: preserve-3d; perspective: 1000px; }
        .chip:active { transform: scale(0.95); }
        .chip.flip-anim { transform: rotateY(180deg) scale(0.95); }
        #box-lid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #d1cae1; border: 2px solid var(--border-color); box-shadow: 2px 2px 10px rgba(0,0,0,0.3); cursor: grab; z-index: 10; transition: transform 0.4s ease-out; }
        #box-lid:active { cursor: grabbing; }
        #app-container.meditation-mode #meditation-box-container { transform: translate(-50%, -50%) scale(1.6); }
        #app-container.gaze-mode #shugyo-header, #app-container.gaze-mode #shugyo-bottom-ui { opacity: 0; pointer-events: none; }

        /* --- Judge (Pan Up & Result) --- */
        #screen-judge { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background-color: #6d6358; z-index: 80; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        #app-container.judging-mode #screen-judge { transform: translateY(100%); }
        #app-container.judging-mode #screen-shugyo { transform: translateY(100%); }
        #scrolls-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .scroll { font-family: var(--font-display); width: 80px; height: 220px; background-color: #eaddcf; border: 2px solid #4a3e30; border-top-width: 10px; border-bottom-width: 15px; display: flex; justify-content: center; align-items: center; font-size: 2rem; transform-origin: top; transform: scaleY(0); transition: transform 0.3s ease-out; box-shadow: 2px 5px 15px rgba(0,0,0,0.5); }
        .scroll.open { transform: scaleY(1); }
        #judge-result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #judge-result-overlay.show { opacity: 1; }
        #judge-title { font-family: var(--font-display); font-size: 5rem; color: #fff; letter-spacing: 0.2em; text-shadow: 0 0 20px rgba(0,0,0,0.8); margin-bottom: 10px; }
        #judge-title.success { color: #f4d03f; }
        #judge-title.failure { color: #e74c3c; }
        #judge-detail { font-size: 1.5rem; color: #fff; background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); text-align: center; line-height: 1.5; }

        /* --- Saho (Rules) --- */
        #screen-saho { flex-direction: row; padding: 0; }
        .saho-nav { width: 30%; background-color: rgba(255, 255, 255, 0.5); border-right: 1px solid var(--border-color); padding: 40px 20px; display: flex; flex-direction: column; gap: 10px; }
        .saho-nav-btn { background: transparent; color: var(--text-sub); border: none; padding: 15px 15px; text-align: left; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .saho-nav-btn.active { color: var(--accent-color); background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .saho-content-area { width: 70%; background-color: #fff; padding: 60px 50px; overflow-y: auto; }
        .saho-panel { display: none; animation: sahoFadeIn 0.4s ease-out; }
        .saho-panel.active { display: block; }
        details { margin-bottom: 20px; border-bottom: 1px solid #eee; }
        summary { padding: 15px 0; font-size: 1.15rem; font-weight: bold; color: var(--text-main); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '＋'; color: var(--border-color); transition: 0.3s; }
        details[open] summary::after { content: '－'; color: var(--accent-color); transform: rotate(180deg); }
        .details-body { padding: 0 0 25px 0; line-height: 1.8; font-size: 0.95rem; color: var(--text-sub); }
        .btn-close-saho { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); border: 1px solid var(--border-color); color: var(--text-sub); width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; z-index: 100; display: flex; justify-content: center; align-items: center; }
        @keyframes sahoFadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @media screen and (orientation: portrait) { #app-container::after { content: "朝の修行が始まります。\A端末を横向きにしてください"; white-space: pre; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-base); color: var(--text-main); display: flex; justify-content: center; align-items: center; text-align: center; font-size: 1.2rem; line-height: 1.6; z-index: 999; padding: 40px; } }
    </style>
</head>
<body>

<audio id="se-orin" src="audio/se_orin.mp3" preload="auto"></audio>
<audio id="se-box-open" src="audio/se_box_open.mp3" preload="auto"></audio>
<audio id="se-box-close" src="audio/se_box_close.mp3" preload="auto"></audio>
<audio id="se-chip-flip" src="audio/se_chip_flip.mp3" preload="auto"></audio>
<audio id="se-scroll" src="audio/se_scroll.mp3" preload="auto"></audio>
<audio id="se-success" src="audio/se_success.mp3" preload="auto"></audio>
<audio id="se-keisaku" src="audio/se_keisaku.mp3" preload="auto"></audio>
<div id="app-container">

    <div id="screen-sanmon" class="screen active">
        <div id="sanmon-title-area"><h1>ZA-ZEN</h1></div>
        <div class="settings-group">
            <label for="gaze-time-select">凝視の儀の長さ：</label>
            <select id="gaze-time-select">
                <option value="1">一瞬 (1秒)</option>
                <option value="3" selected>標準 (3秒)</option>
                <option value="5">入門 (5秒)</option>
            </select>
        </div>
        <div class="action-buttons">
            <button class="btn" onclick="switchScreen('screen-saho')">修業作法</button>
            <button class="btn" onclick="enterShugyo()" style="border-color: var(--accent-color); color: var(--accent-color);">入山</button>
        </div>
    </div>

    <div id="screen-shugyo" class="screen">
        <div id="system-message"></div>
        <div id="shugyo-header"><button id="btn-judge" class="btn" onclick="startJudgment()">審査</button></div>
        <div id="meditation-box-container">
            <div id="box-inside"></div>
            <div id="box-lid"></div>
        </div>
        <div id="shugyo-bottom-ui">
            <button class="btn" onclick="switchScreen('screen-saho')">作法</button>
            <div id="dial-container">
                <span id="dial-label">めくる枚数</span>
                <div id="dial-control">
                    <button class="dial-btn" onclick="changeFlipCount(-1)">－</button>
                    <span id="flip-count-display">1</span>
                    <button class="dial-btn" onclick="changeFlipCount(1)">＋</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-judge">
        <div id="scrolls-container"></div>
        <div id="judge-result-overlay">
            <div id="judge-title"></div>
            <div id="judge-detail"></div>
        </div>
    </div>

    <div id="screen-saho" class="screen">
        <button class="btn-close-saho" onclick="closeSaho()">×</button>
        <div class="saho-nav">
            <button class="saho-nav-btn active" onclick="switchSahoTab('tab-prep')">① 修業の前に</button>
            <button class="saho-nav-btn" onclick="switchSahoTab('tab-gaze')">② 凝視の儀</button>
            <button class="saho-nav-btn" onclick="switchSahoTab('tab-turn')">③ 手番の流れ</button>
            <button class="saho-nav-btn" onclick="switchSahoTab('tab-judge')">④ 審査について</button>
            <button class="saho-nav-btn" onclick="switchSahoTab('tab-end')">⑤ ゲームの終了</button>
        </div>
        <div class="saho-content-area">
            <div id="tab-prep" class="saho-panel active"><details open><summary>準備</summary><div class="details-body">スマホを横向きにし、音量を確認してください。<br>各プレイヤーは、自分の前にスマホを置きます。</div></details></div>
            <div id="tab-gaze" class="saho-panel"><details open><summary>心を整える</summary><div class="details-body">ゲーム開始時、指定された秒数だけ箱の中身を見ることができます。</div></details></div>
            <div id="tab-turn" class="saho-panel"><details open><summary>1. 煩悩を払う</summary><div class="details-body">右下のダイヤルで枚数を設定し、箱をスワイプして開けます。<br>チップをタップして煩悩を払います。</div></details></div>
            <div id="tab-judge" class="saho-panel"><details open><summary>警策</summary><div class="details-body">住職がマスに止まったら「審査」ボタンを押します。<br>バランスが崩れていると警策を受けます。</div></details></div>
            <div id="tab-end" class="saho-panel"><details open><summary>徳の高さ</summary><div class="details-body">最も徳コインを集めたプレイヤーが勝者となります。</div></details></div>
        </div>
    </div>

</div>

<script>
    /* =========================================
       ゲームロジック・状態管理
    ========================================= */
    const PAIR_TYPES = [['身','息'],['身','息'],['息','心'],['息','心'],['心','身'],['心','身']];
    let appState = { gazeTime: 3, isGazeDone: false, currentFlipCount: 1, remainingFlips: 0, isMeditationMode: false, isJudging: false, chips: [] };

    function playSE(seId) {
        const audio = document.getElementById(seId);
        if (audio && audio.src && audio.src !== window.location.href) {
            audio.currentTime = 0; audio.play().catch(e => { /* 無視 */ });
        }
    }

    function showMessage(text, durationMs = 0) {
        const msgEl = document.getElementById('system-message');
        msgEl.innerText = text; msgEl.classList.add('show');
        if (durationMs > 0) setTimeout(() => msgEl.classList.remove('show'), durationMs);
    }
    function hideMessage() { document.getElementById('system-message').classList.remove('show'); }

    /* =========================================
       初期化・画面遷移
    ========================================= */
    function initGameData() {
        let pairs = [...PAIR_TYPES]; pairs.sort(() => Math.random() - 0.5);
        appState.chips = pairs.map(pair => { return { faces: pair, currentSideIdx: Math.floor(Math.random() * 2) }; });
        renderChips(false);
    }

    let previousScreenId = 'screen-sanmon';
    function switchScreen(targetId) {
        if (targetId === 'screen-shugyo' && appState.isMeditationMode && previousScreenId === 'screen-saho') closeMeditationBox();
        const currentActive = document.querySelector('.screen.active');
        if (currentActive) { currentActive.classList.remove('active'); if (currentActive.id !== 'screen-saho') previousScreenId = currentActive.id; }
        document.getElementById(targetId).classList.add('active');
    }

    function enterShugyo() {
        appState.gazeTime = parseInt(document.getElementById('gaze-time-select').value);
        initGameData(); switchScreen('screen-shugyo');
        document.getElementById('app-container').classList.add('gaze-mode');
        showMessage('瞑想箱をタップして「凝視の儀」を開始');
    }

    function closeSaho() { switchScreen(previousScreenId); }
    function switchSahoTab(tabId) {
        document.querySelectorAll('.saho-nav-btn').forEach(btn => btn.classList.remove('active'));
        if (event) event.target.classList.add('active');
        document.querySelectorAll('.saho-panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    /* =========================================
       チップの描画と操作
    ========================================= */
    function renderChips(showFace) {
        const inside = document.getElementById('box-inside'); inside.innerHTML = '';
        appState.chips.forEach((chip, index) => {
            const el = document.createElement('div'); el.className = 'chip'; el.dataset.index = index;
            
            if (showFace) {
                const faceStr = chip.faces[chip.currentSideIdx];
                if(faceStr === '身') { el.classList.add('face-body'); el.innerText = '身'; }
                else if(faceStr === '息') { el.classList.add('face-breath'); el.innerText = '息'; }
                else if(faceStr === '心') { el.classList.add('face-mind'); el.innerText = '心'; }
            } else {
                el.classList.add('face-hidden'); el.innerText = '？';
            }
            
            el.onclick = () => handleChipClick(index, el);
            inside.appendChild(el);
        });
    }

    function handleChipClick(index, element) {
        if (!appState.isMeditationMode || !appState.isGazeDone || appState.isJudging) return;
        if (appState.remainingFlips > 0) {
            const chip = appState.chips[index]; chip.currentSideIdx = 1 - chip.currentSideIdx;
            playSE('se-chip-flip');
            
            element.classList.add('flip-anim');
            setTimeout(() => element.classList.remove('flip-anim'), 300);
            
            appState.remainingFlips--;
            if (appState.remainingFlips > 0) { showMessage(`残り ${appState.remainingFlips} 回`); }
            else { showMessage('完了。現実へ戻ります...', 1500); setTimeout(() => closeMeditationBox(), 800); }
        }
    }

    /* =========================================
       瞑想箱の開閉制御
    ========================================= */
    function changeFlipCount(delta) {
        let newCount = appState.currentFlipCount + delta;
        if (newCount < 1) newCount = 1; if (newCount > 4) newCount = 4;
        appState.currentFlipCount = newCount; document.getElementById('flip-count-display').innerText = newCount;
    }

    function openMeditationBox() {
        if (appState.isMeditationMode || appState.isJudging) return;
        playSE('se-box-open'); appState.isMeditationMode = true;
        document.getElementById('app-container').classList.add('meditation-mode');
        document.getElementById('box-lid').style.transform = 'translateX(-120%)';

        if (!appState.isGazeDone) {
            hideMessage(); playSE('se-orin'); renderChips(true);
            let timeLeft = appState.gazeTime; showMessage(`記憶してください... 残り ${timeLeft}秒`);
            const timer = setInterval(() => {
                timeLeft--;
                if(timeLeft > 0) showMessage(`記憶してください... 残り ${timeLeft}秒`);
                else {
                    clearInterval(timer); renderChips(false); showMessage('記憶終了', 1000);
                    appState.isGazeDone = true;
                    setTimeout(() => { closeMeditationBox(); document.getElementById('app-container').classList.remove('gaze-mode'); }, 1000);
                }
            }, 1000);
        } else {
            appState.remainingFlips = appState.currentFlipCount;
            showMessage(`煩悩を ${appState.remainingFlips} 回払ってください`);
            renderChips(false);
        }
    }

    function closeMeditationBox() {
        if (!appState.isMeditationMode) return;
        playSE('se-box-close'); appState.isMeditationMode = false;
        document.getElementById('app-container').classList.remove('meditation-mode');
        document.getElementById('box-lid').style.transform = 'translateX(0)';
        hideMessage();
    }

    // スワイプ操作
    const lidElement = document.getElementById('box-lid'); let touchstartX = 0;
    lidElement.addEventListener('click', function(e) { if (!appState.isGazeDone && !appState.isMeditationMode) openMeditationBox(); });
    lidElement.addEventListener('touchstart', function(e) { if (appState.isMeditationMode || !appState.isGazeDone) return; touchstartX = e.changedTouches[0].screenX; this.style.transition = 'none'; }, {passive: true});
    lidElement.addEventListener('touchmove', function(e) { if (appState.isMeditationMode || !appState.isGazeDone) return; let offsetX = e.changedTouches[0].screenX - touchstartX; if (offsetX < 0) { let moveX = Math.max(offsetX, -lidElement.offsetWidth); this.style.transform = `translateX(${moveX}px)`; } }, {passive: true});
    lidElement.addEventListener('touchend', function(e) { if (appState.isMeditationMode || !appState.isGazeDone) return; let touchendX = e.changedTouches[0].screenX; this.style.transition = 'transform 0.4s ease-out'; if (touchstartX - touchendX > lidElement.offsetWidth / 3) openMeditationBox(); else this.style.transform = 'translateX(0)'; }, {passive: true});

    /* =========================================
       審査シーケンス
    ========================================= */
    function startJudgment() {
        if (!appState.isGazeDone || appState.isJudging) return;
        if (appState.isMeditationMode) closeMeditationBox();
        appState.isJudging = true; hideMessage();
        document.getElementById('app-container').classList.add('judging-mode');

        const container = document.getElementById('scrolls-container'); container.innerHTML = '';
        const currentFaces = appState.chips.map(chip => chip.faces[chip.currentSideIdx]);
        
        currentFaces.forEach((face, idx) => {
            const scroll = document.createElement('div'); scroll.className = 'scroll'; scroll.id = `scroll-${idx}`;
            scroll.innerHTML = `<span>${face}</span>`;
            container.appendChild(scroll);
        });

        setTimeout(() => { openScrollsSequentially(currentFaces); }, 1000);
    }

    function openScrollsSequentially(faces) {
        let index = 0;
        const interval = setInterval(() => {
            if (index < faces.length) {
                document.getElementById(`scroll-${index}`).classList.add('open');
                playSE('se-scroll'); index++;
            } else {
                clearInterval(interval);
                setTimeout(() => { judgeResult(faces); }, 800);
            }
        }, 400);
    }

    function judgeResult(faces) {
        const counts = { '身': 0, '息': 0, '心': 0 }; faces.forEach(face => counts[face]++);
        const titleEl = document.getElementById('judge-title');
        const detailEl = document.getElementById('judge-detail');
        const overlay = document.getElementById('judge-result-overlay');
        const appContainer = document.getElementById('app-container');

        // 揺れアニメーションを確実にリセット
        appContainer.classList.remove('shake-active');
        void appContainer.offsetWidth; 

        titleEl.className = '';
        let isSuccess = false;

        if (counts['身'] === 2 && counts['息'] === 2 && counts['心'] === 2) {
            isSuccess = true;
            playSE('se-success');
            titleEl.innerText = '成功！'; titleEl.classList.add('success');
            detailEl.innerText = '完璧なバランスです。場のコインを総取りします。';
        } else {
            playSE('se-keisaku');
            appContainer.classList.add('shake-active'); 
            const penalty = Math.max(counts['身'], counts['息'], counts['心']) - Math.min(counts['身'], counts['息'], counts['心']);
            titleEl.innerText = '警策'; titleEl.classList.add('failure');
            detailEl.innerHTML = `心の乱れが生じています。<br>徳コインを <strong style="color:#f4d03f; font-size:1.8rem;">${penalty} 枚</strong> 支払って下さい。`;
        }

        overlay.classList.add('show');

        setTimeout(() => {
            overlay.classList.remove('show');
            appContainer.classList.remove('judging-mode');
            appContainer.classList.remove('shake-active'); 
            appState.isJudging = false;

            if (isSuccess) {
                appState.isGazeDone = false;
                initGameData();
                appContainer.classList.add('gaze-mode');
                setTimeout(() => {
                    showMessage('チップが再配置されました。箱をタップして「凝視の儀」を開始してください', 4000);
                }, 800); 
            }
        }, 4000);
    }
</script>
